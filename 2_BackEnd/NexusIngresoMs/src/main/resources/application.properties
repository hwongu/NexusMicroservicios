spring.application.name=NexusIngresoMs

# Puerto dedicado para aislar este microservicio del resto del ecosistema.
server.port=8083

# Context path global del microservicio. Spring Boot lo antepone a todas las rutas REST.
server.servlet.context-path=/NexusMS

# Configuracion de la conexion hacia la base de datos exclusiva de ingresos.
spring.datasource.url=jdbc:postgresql://localhost:5435/db_ingresos
spring.datasource.username=${DB_INGRESOS_USERNAME:admin_nexus}
spring.datasource.password=${DB_INGRESOS_PASSWORD:admin_password_123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate no debe alterar el esquema en un entorno si la base ya existe.
spring.jpa.hibernate.ddl-auto=none

# Estas propiedades ayudan a observar las consultas generadas por JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Evita mantener la sesion abierta durante la vista y obliga a resolver los datos en la capa de servicio.
spring.jpa.open-in-view=false

# URLs base de los microservicios vecinos usadas para integracion HTTP simple.
app.seguridad.base-url=http://localhost:8081/NexusMS
app.catalogo.base-url=http://localhost:8082/NexusMS
